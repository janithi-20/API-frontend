<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Login/Register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>Task Manager</h1>
                <p>Register or sign in to manage your tasks</p>
            </div>

            <form id="loginForm" class="auth-form active">
                <h2>Login</h2>
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input id="loginUsername" type="text" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input id="loginPassword" type="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <div id="loginMessage" class="form-message"></div>
                <p class="switch-text">No account? <a href="#" onclick="toggleForms(); return false;">Register</a></p>
            </form>

            <form id="registerForm" class="auth-form">
                <h2>Register</h2>
                <div class="form-group">
                    <label for="registerUsername">Username</label>
                    <input id="registerUsername" type="text" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input id="registerPassword" type="password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input id="confirmPassword" type="password" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="btn btn-primary">Register</button>
                <div id="registerMessage" class="form-message"></div>
                <p class="switch-text">Already have an account? <a href="#" onclick="toggleForms(); return false;">Login</a></p>
            </form>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="auth.js"></script>
</body>
</html>
